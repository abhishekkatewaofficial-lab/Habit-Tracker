name: habit_tracker_ios
description: A production-ready iOS habit tracker built with Flutter, Clean Architecture, and Riverpod.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Local Database ──────────────────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Notifications ────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # ── Location ────────────────────────────────────────────────────────────────
  geolocator: ^13.0.2

  # ── Charts ──────────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Fonts ───────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Utilities ───────────────────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1

  # ── UI Helpers ───────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  gap: ^3.0.1
  flutter_slidable: ^3.1.0
  image_picker: ^1.2.1
  image_cropper: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ──────────────────────────────────────────────────────────
  # Pin to a consistent analyzer band (^7.x) shared by all generators.
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  # riverpod_generator and freezed omitted until hive_generator supports analyzer ^7
  json_serializable: ^6.8.0

  # ── Linting ──────────────────────────────────────────────────────────────────
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFProDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/SFProDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/SFProDisplay-Semibold.ttf
          weight: 600
        - asset: assets/fonts/SFProDisplay-Bold.ttf
          weight: 700
