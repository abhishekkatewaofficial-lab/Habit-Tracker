name: habit_tracker_ios
description: A production-ready iOS habit tracker built with Flutter, Clean Architecture, and Riverpod.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Local Database ──────────────────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Notifications ────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # ── Location ────────────────────────────────────────────────────────────────
  geolocator: ^13.0.2

  # ── Step Tracking ──────────────────────────────────────────────────────────
  pedometer: ^4.0.0

  # ── Charts ──────────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Fonts ───────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Utilities ───────────────────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  equatable: ^2.0.5

  # ── UI Helpers ───────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.0
  flutter_timezone: ^5.0.2
  wakelock_plus: ^1.5.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^7.2.0
  flutter_svg: ^2.2.4
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

  # ── Code Generation ──────────────────────────────────────────────────────────
  # Pin to a consistent analyzer band (^7.x) shared by all generators.
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  # riverpod_generator and freezed omitted until hive_generator supports analyzer ^7

  # ── Linting ──────────────────────────────────────────────────────────────────
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/avatars/
    - assets/icons/
    - assets/animations/
    - assets/habit_icons/
    - assets/habit_icons/fitness/
    - assets/habit_icons/study/
    - assets/habit_icons/health/
    - assets/habit_icons/productivity/
    - assets/habit_icons/lifestyle/

  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFProDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/SFProDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/SFProDisplay-Semibold.ttf
          weight: 600
        - asset: assets/fonts/SFProDisplay-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#ECF4F1"
  image: "assets/images/app_logo.png"
  color_dark: "#1A1C1A"
  image_dark: "assets/images/app_logo.png"
  android: false
  ios: true
